# Selection GUI
selection-title: Select <white>{material}<gray> Skins
selection-size: 54
selection-slots:
  filter_all:
    slot: 47
    type: FilterSlot
    category: ALL
    material: CHEST
    name: <yellow>All Skins
    lore:
      - <gray>Show every skin in this category.
  filter_owned:
    slot: 46
    type: FilterSlot
    category: OWNED
    material: EMERALD
    name: <green>Owned
    lore:
      - <gray>Show only skins you own.
  back:
    slot: 45
    type: BackSlot
    material: ARROW
    name: <red>Back
    lore:
      - <gray>Return to categories.
