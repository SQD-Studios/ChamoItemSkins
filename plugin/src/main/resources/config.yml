rarities:
  enabled: true
  common:
    name: Common
    color: "<gray>"
    priority: 0
  rare:
    name: Rare
    color: "<blue>"
    priority: 1
  epic:
    name: Epic
    color: "<light_purple>"
    priority: 2
  legendary:
    name: Legendary
    color: "<gold>"
    priority: 3

database:

  # Choose MySQL or SQLite
  # MySQL (For multiserver support (Not tested))
  # SQLite (Great lightweight solution)
  type: sqlite

  # MySQL Only
  host: localhost
  port: 3306
  database: chamoitemskins
  username: root
  password: ""

  # SQLite Only
  sqlite-file: plugins/ChamoItemSkins/data.db

cache:
  ttl-seconds: 300 # Time to live seconds

filler:
  filler-item: true
  item:
    material: GRAY_STAINED_GLASS_PANE
    name: " "
    lore: []
    glow: false

note:
  default-material: PAPER
  display-name: "{skin_name} <i><dark_gray>[Permanent Skin Note]" # You can still put {time_left} there, and it will default to Permanent :D
  temporary-name: "{skin_name} <i><dark_gray>[{time_left} Day(s) Skin Note]"
  lore:
    - "" # You can put these placeholders here too!

filter:
  chosen-character: " > {category}"


# Believe some messages are inlined and should be configured? You can make an issue on GitHub!
# https://github.com/SQD-Studios/ChamoItemSkins/issues/new
language: en

selfpack: # This is if you want to have self pack hosting for your server. You will need an open port.
  enable: true # This can and will affect your CPU and RAM
  port: 32768 # An open port to host the server to
  ip: localhost # IMPORTANT. CHANGE THIS OR IT WILL NOT WORK CORRECTLY


  # This is pre-make only
  pre-make: false # When true, if you put the models in the selfpack/models and the textures into selfpack/models/textures. If false we expect you to put a texture pack in selfpack/resourcepack.zip (The resourcepack.zip should be your pack)
  description: "Server Resource Pack" # The description of the resource pack.


categories:
  sword:
    name: Sword
    items: # If it is not a full item id it will just search if it contains it. E.g. for sword it will be applicable on all sword skins. If it is DIAMOND_SWORD it can be only applied to a diamond swor
      - SWORD
  picks:
    name: Pickaxe
    items:
      - PICKAXE
  axes:
    name: Axe
    items:
      - AXE
  shield:
    name: Shield
    items:
      - SHIELD
  bow:
    name: Bow
    items:
      - BOW
  crossbow:
    name: Crossbow
    items:
      - CROSSBOW
  shovel:
    name: Shovel
    items:
      - SHOVEL
  spear:
    name: Spear
    items:
      - SPEAR
  mace:
    name: Mace
    items:
      - MACE
  hoe: # Peak btw
    name: Hoe
    items: HOE