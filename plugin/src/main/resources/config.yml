rarities:
  enabled: true
  common:
    name: Common
    color: "<gray>"
    priority: 0
  rare:
    name: Rare
    color: "<blue>"
    priority: 1
  epic:
    name: Epic
    color: "<light_purple>"
    priority: 2
  legendary:
    name: Legendary
    color: "<gold>"
    priority: 3

database:

  # Choose MySQL or SQLite
  # MySQL (For multiserver support (Not tested))
  # SQLite (Great lightweight solution)
  type: sqlite

  # MySQL Only
  host: localhost
  port: 3306
  database: chamoitemskins
  username: root
  password: ""

  # SQLite Only
  sqlite-file: plugins/ChamoItemSkins/data.db

cache:
  ttl-seconds: 300 # Time to live seconds

filler:
  filler-item: true
  item:
    material: GRAY_STAINED_GLASS_PANE
    name: " "
    lore: []
    glow: false

note:
  default-material: PAPER
  display-name: "{skin_name} <i><dark_gray>[Permanent Skin Note]" # You can still put {time_left} there, and it will default to Permanent :D
  temporary-name: "{skin_name} <i><dark_gray>[{time_left} Day(s) Skin Note]"
  lore:
    - "" # You can put these placeholders here too!

filter:
  chosen-character: " > {category}"

messages:
  skin-equipped: "<green>✔ Equipped <white>{skin_name}<green>."
  skin-unequipped: "<yellow>Skin <white>{skin_name}<yellow> removed."
  skin-not-owned: "<red>✘ You don't own <white>{skin_name}<red>."
  grant-received: "<green>✔ You unlocked <white>{skin_name}<green>!"
  skin-revoked-notify: "<red>Your skin <white>{skin_name}<red> was revoked."
  admin-grant-success: "<green>Granted <white>{skin_name}<green> to <white>{player}<green>."
  admin-revoke-success: "<red>Revoked <white>{skin_name}<red> from <white>{player}<red>."
  reload-success: "<green>ChamoItemSkins reloaded."
  already-owned: "<red>You already own this skin!"
  editor-saved: "<green>Skin <white>{skin_name}<green> saved."
  editor-deleted: "<red>Skin <white>{skin_id}<red> deleted."
