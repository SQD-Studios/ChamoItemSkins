rarities:
  enabled: true
  common:
    name: Common
    color: "<gray>"
    priority: 0
  rare:
    name: Rare
    color: "<blue>"
    priority: 1
  epic:
    name: Epic
    color: "<light_purple>"
    priority: 2
  legendary:
    name: Legendary
    color: "<gold>"
    priority: 3

database:

  # Choose MySQL or SQLite
  # MySQL (For multiserver support (Not tested))
  # SQLite (Great lightweight solution)
  type: sqlite

  # MySQL Only
  host: localhost
  port: 3306
  database: chamoitemskins
  username: root
  password: ""

  # SQLite Only
  sqlite-file: plugins/ChamoItemSkins/data.db

cache:
  ttl-seconds: 300 # Time to live seconds

filler:
  filler-item: true
  item:
    material: GRAY_STAINED_GLASS_PANE
    name: " "
    lore: []
    glow: false

note:
  default-material: PAPER
  display-name: "{skin_name} <i><dark_gray>[Permanent Skin Note]" # You can still put {time_left} there, and it will default to Permanent :D
  temporary-name: "{skin_name} <i><dark_gray>[{time_left} Day(s) Skin Note]"
  lore:
    - "" # You can put these placeholders here too!

filter:
  chosen-character: " > {category}"


# Believe some messages are inlined and should be configured? You can make an issue on GitHub!
# https://github.com/SQD-Studios/ChamoItemSkins/issues/new
language: en
