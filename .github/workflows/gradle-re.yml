name: Release packages (Releases)
on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew shadowJar

      - name: Publish to maven.chamosmp.net
        run: ./gradlew publishMavenPublicationToChamoSMP-ReleasesRepository
        env:
          REPOSILITE_USER: ${{ secrets.REPOSILITE_USER }}
          REPOSILITE_TOKEN: ${{ secrets.REPOSILITE_TOKEN }}
