name: Generate and Deploy Dokka Docs

on:
  push:
    branches: [ main, master ]   # adjust to your default branch
  workflow_dispatch:             # allows manual triggering

env:
  # Set the base URL that Dokka uses for all links.
  # If you host the docs at https://sqd-studios.github.io/jd/ChamoItemSkins,
  # set this to '/jd/ChamoItemSkins' (with leading slash).
  DOKKA_BASE_URL: '/'

  # Where to place the generated files on the deployment branch.
  # Leave empty to deploy to the root of the branch.
  # Example: 'jd/ChamoItemSkins' will make the docs available at
  # https://<username>.github.io/<repository>/jd/ChamoItemSkins
  # (or under a user site at https://<username>.github.io/jd/ChamoItemSkins
  #  if you deploy to a repository named <username>.github.io).
  DEPLOY_SUBDIR: ''
  # --------------------------------------------------------------------

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate Dokka documentation
        run: ./gradlew :dokkaGenerate

      - name: Prepare deployment artifact (with subdirectory)
        run: |
          mkdir -p ./pages/${{ env.DEPLOY_SUBDIR }}
          cp -r ./build/dokka/html/* ./pages/${{ env.DEPLOY_SUBDIR }}/

      - name: Deploy to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./pages

  deploy:
    needs: build-and-deploy
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4