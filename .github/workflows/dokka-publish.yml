name: Build and deploy dokka to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bypass Cloudflare for GitHub Actions
        uses: xiaotianxt/bypass-cloudflare-for-github-action@v1.1.1
        with:
          cf_zone_id: ${{ secrets.CF_ZONE_ID }}
          cf_api_token: ${{ secrets.CF_API_TOKEN }}
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 25
      - uses: gradle/gradle-build-action@v2
      - name: Build Dokka HTML
        run: ./gradlew :dokkaGenerate --no-daemon --stacktrace
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'api/build/dokka/html'

  deploy:
    environment:
      name: github-pages
      url: 'https://sqd-studios.github.io/jd/chamoitemskins'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4